<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="hexGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <radialGradient id="glowBlue" cx="22%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowPurple" cx="85%" cy="78%" r="42%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.11"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glowBlue)"/>
  <rect width="1200" height="630" fill="url(#glowPurple)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="5" height="630" fill="#0ea5e9"/>

  <!-- Hexagon logo mark: center (155, 315), r=60 -->
  <polygon points="155,255 207,285 207,345 155,375 103,345 103,285" fill="url(#hexGrad)"/>
  <!-- Data normalization bars inside hexagon (scaled 1.5x from 100x100 design) -->
  <rect x="115" y="290" width="39" height="12" rx="6" fill="white" opacity="0.55"/>
  <rect x="115" y="309" width="81" height="12" rx="6" fill="white" opacity="0.95"/>
  <rect x="115" y="329" width="57" height="12" rx="6" fill="white" opacity="0.75"/>

  <!-- Title -->
  <text
    x="250"
    y="305"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="68"
    font-weight="800"
    fill="#f9fafb"
    letter-spacing="-2"
  >Benefit Plan Standard</text>

  <!-- Subtitle -->
  <text
    x="252"
    y="365"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="26"
    font-weight="400"
    fill="#94a3b8"
  >Open, vendor-neutral schema for health benefit plan data</text>

  <!-- Divider -->
  <rect x="252" y="410" width="828" height="1.5" fill="#1e293b" rx="1"/>

  <!-- Domain -->
  <text
    x="252"
    y="450"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="22"
    font-weight="500"
    fill="#0ea5e9"
    letter-spacing="0.3"
  >benefitplanstandard.org</text>

  <!-- Schema version badge -->
  <rect x="940" y="427" width="168" height="36" rx="18" fill="#0ea5e9" fill-opacity="0.1" stroke="#0ea5e9" stroke-opacity="0.35" stroke-width="1"/>
  <text
    x="1024"
    y="450"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="15"
    font-weight="600"
    fill="#38bdf8"
    text-anchor="middle"
    letter-spacing="0.5"
  >JSON Schema v1.0.0</text>

</svg>
